services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hub_test
      POSTGRES_PASSWORD: hub_test
      POSTGRES_DB: hub_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub_test"]
      interval: 5s
      timeout: 5s
      retries: 10
