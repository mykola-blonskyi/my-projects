services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/mykola-blonskyi/my-projects:latest
    container_name: hub
    restart: unless-stopped
    environment:
      - DATABASE_URL
      - AUTH_SECRET
      - AUTH_TRUST_HOST
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - OWNER_EMAIL
      - API_URL=https://blonskyi.dev
    ports:
      - "3000:3000"
    networks:
      - coolify

networks:
  coolify:
    external: true
